  />

  />

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="ecard-shell">

    <main class="deem-page">

      <!-- BACK -->
      <a class="back-btn" href="index.html">
        ‹
      </a>

      <!-- HEADER -->
      <div class="deem-header">

        <img
          class="deem-logo"
          src="Logo.png"
          alt=""
        />

      </div>

      <!-- BUTTONS -->
      <div class="deem-buttons">

        <a class="deem-btn" href="https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=780b3fec0e32445fafd5e3bf0ba385c2&metadata=01">

          <span>
            Congratulations Deem
          </span>

          <b>›</b>

        </a>

        <a class="deem-btn" href="https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=1c4422dbe7c14bb18fa378089ceba834&metadata=01">

          </span>

        </a>

        <a class="deem-btn" href="https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=6188dae1995a4e139f85f5f66c05e990&metadata=01">

          </span>

          <b>›</b>

      </div>

  </div>

  <script>

    function fitCard(){

      const scale = Math.min(
        window.innerWidth / 1080,
        window.innerHeight / 1920,
        1
      );

      document.documentElement.style.setProperty(
        "--scale",
        scale
      );

    }

    fitCard();

    window.addEventListener("resize", fitCard);

  </script>

</body>
